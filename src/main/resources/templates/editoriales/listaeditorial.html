<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editoriales</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>

<nav class="barra-navegacion">
    <a href="/" class="titulo-logo">Biblioteca</a>
    <div>
        <a href="/">Inicio</a>
        <a href="/editoriales">Editoriales</a>
        <a href="/libros">Libros</a>
    </div>
</nav>

<div class="contenedor">
    <div class="cabecera-seccion">
        <h2>Lista de Editoriales</h2>
        <button class="boton boton-verde" onclick="abrirModal()">+ Nueva Editorial</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla-editoriales"></tbody>
    </table>
</div>

<div class="fondo-modal" id="modal-editorial">
    <div class="caja-modal">
        <div class="cabecera-modal">
            <h3 id="titulo-modal">Nueva Editorial</h3>
            <button class="boton-cerrar" onclick="cerrarModal()">X</button>
        </div>

        <form id="form-editorial">
            <input type="hidden" id="id-editorial">

            <div class="grupo-campo">
                <label>Nombre</label>
                <input type="text" id="nombre">
                <span id="error-nombre" style="color: #dc3545; font-size: 12px; display: none; margin-top: 5px;"></span>
            </div>

            <div class="grupo-campo">
                <label>Dirección</label>
                <input type="text" id="direccion">
                <span id="error-direccion" style="color: #dc3545; font-size: 12px; display: none; margin-top: 5px;"></span>
            </div>

            <div class="grupo-campo">
                <label>Teléfono</label>
                <input type="text" id="telefono">
                <span id="error-telefono" style="color: #dc3545; font-size: 12px; display: none; margin-top: 5px;"></span>
            </div>

            <div class="pie-modal">
                <button type="button" class="boton boton-gris" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="boton boton-verde">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        listarEditoriales();
    });

    function listarEditoriales() {
        fetch('/editoriales/listar')
            .then(res => res.json())
            .then(res => {
                let tabla = document.getElementById('tabla-editoriales');
                tabla.innerHTML = '';
                if(res.success && res.data) {
                    res.data.forEach(ed => {
                        tabla.innerHTML += `
                        <tr>
                            <td>${ed.id}</td>
                            <td>${ed.nombre}</td>
                            <td>${ed.direccion}</td>
                            <td>${ed.telefono}</td>
                            <td>
                                <button class="boton boton-amarillo" onclick="editarEditorial(${ed.id}, '${ed.nombre}', '${ed.direccion}', '${ed.telefono}')">Editar</button>
                                <button class="boton boton-rojo" onclick="eliminarEditorial(${ed.id})">Borrar</button>
                            </td>
                        </tr>
                        `;
                    });
                }
            });
    }

    document.getElementById('form-editorial').addEventListener('submit', function(evento) {
        evento.preventDefault();

        limpiarErrores();

        let datos = {
            id: document.getElementById('id-editorial').value || null,
            nombre: document.getElementById('nombre').value,
            direccion: document.getElementById('direccion').value,
            telefono: document.getElementById('telefono').value
        };

        fetch('/editoriales/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
            .then(async response => {
                const resData = await response.json();

                if (response.ok) {
                    cerrarModal();
                    listarEditoriales();

                    if (datos.id) {
                        mostrarToast("Cambios guardados correctamente", "exito");
                    } else {
                        mostrarToast("Nueva editorial agregada con éxito", "exito");
                    }

                } else if (response.status === 400) {
                    mostrarErroresCampos(resData.fieldErrors);
                } else {
                    mostrarToast(resData.message, "error");
                }
            })
    });

    function eliminarEditorial(id) {
        if(confirm('¿Está seguro de eliminar esta editorial?')) {
            fetch('/editoriales/eliminar/' + id, {
                method: 'DELETE'
            })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        listarEditoriales();
                        mostrarToast("Editorial eliminada del sistema", "exito");
                    } else {
                        mostrarToast(data.message, "error");
                    }
                });
        }
    }

    // --- FUNCIONES DE INTERFAZ Y MODAL ---

    function abrirModal() {
        document.getElementById('id-editorial').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('direccion').value = '';
        document.getElementById('telefono').value = '';
        limpiarErrores();

        document.getElementById('titulo-modal').innerText = 'Nueva Editorial';
        document.getElementById('modal-editorial').style.display = 'flex';
    }

    function editarEditorial(id, nombre, direccion, telefono) {
        document.getElementById('id-editorial').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('direccion').value = direccion;
        document.getElementById('telefono').value = telefono;
        limpiarErrores();

        document.getElementById('titulo-modal').innerText = 'Editar Editorial';
        document.getElementById('modal-editorial').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal-editorial').style.display = 'none';
    }

    function limpiarErrores() {
        // Oculta todos los span rojos
        document.getElementById('error-nombre').style.display = 'none';
        document.getElementById('error-direccion').style.display = 'none';
        document.getElementById('error-telefono').style.display = 'none';
    }

    function mostrarErroresCampos(errores) {
        // Si el backend mandó errores específicos, los inyecta en los span correspondientes
        if(errores.nombre) {
            let span = document.getElementById('error-nombre');
            span.innerText = "✖ " + errores.nombre;
            span.style.display = 'block';
        }
        if(errores.direccion) {
            let span = document.getElementById('error-direccion');
            span.innerText = "✖ " + errores.direccion;
            span.style.display = 'block';
        }
        if(errores.telefono) {
            let span = document.getElementById('error-telefono');
            span.innerText = "✖ " + errores.telefono;
            span.style.display = 'block';
        }
    }
    // --- SISTEMA DE NOTIFICACIONES TOAST ---
    function mostrarToast(mensaje, tipo = 'exito') {
        // Busca si ya existe el contenedor, si no, lo crea
        let contenedor = document.getElementById('contenedor-toast');
        if (!contenedor) {
            contenedor = document.createElement('div');
            contenedor.id = 'contenedor-toast';
            document.body.appendChild(contenedor);
        }

        // Crea la notificación
        const toast = document.createElement('div');
        toast.className = `toast toast-${tipo}`;
        toast.innerText = (tipo === 'exito' ? '✅ ' : '⚠️ ') + mensaje;

        // La agrega a la pantalla
        contenedor.appendChild(toast);

        // La elimina del código después de 3 segundos para no acumular basura
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
</script>
</body>
</html>
