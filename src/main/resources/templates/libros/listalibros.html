<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Libros</title>
    <link rel="stylesheet" href="resources/static/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Libros</h4>

            <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                Nuevo Libro
            </button>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Editorial</th>
                    <th>Código ISBN</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id = "tableLibros">

                </tbody>
            </table>

        </div>
    </div>
</div>


<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/libros/save}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Nuevo Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label class="form-label">Titulo</label>
                    <input type="text"
                           name="titulo"
                           class="form-control"
                           placeholder="Ingrese el titulo" id="titulo" pattern="[A-Za-z]+" required>
                </div>
                <div class="modal-body">
                    <label class="form-label">Codigo ISBN</label>
                    <input type="text"
                           name="codigoISBN"
                           class="form-control"
                           placeholder="Ingrese ISBN" id="codigo" pattern="[0-9]+" required>
                </div>
                <div class="modal-body">
                    <label class="form-label">Año Publicación</label>
                    <input type="text"
                           name="anioPublicacion"
                           class="form-control"
                           placeholder="Ingrese año correcto" id="anio" pattern="[0-9]{4}+" required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>


<div th:each="lib : ${libs}">

    <div class="modal fade" th:id="'modalEditar' + ${libs.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/libros/save}" method="post">
                    <div class="modal-header bg-warning">
                        <h5 class="modal-title">Editar Libro</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" name="id" th:value="${libs.id}">

                        <label class="form-label">Titulo</label>
                        <input type="text"
                               name="titulo"
                               class="form-control"
                               th:value="${libs.titulo}"
                               required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-warning">
                            Actualizar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'modalEliminar' + ${libs.id}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Eliminar Libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>
                        ¿Está seguro de eliminar el libro?
                        <strong th:text="${libs.nombre}"></strong>?
                    </p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <a class="btn btn-danger"
                       th:href="@{/libros/eliminar/{id}(id=${libs.id})}">
                        Sí, eliminar
                    </a>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded",function(){
        listarLibros();
    });
    function listarLibros(){
        fetch('/libros/listalibros').then(response => response.json()).then(response => {
            let table = document.getElementById('tableLibros');
            //table.innerHTML=``;
            //<td>${libro.editorial}</td>
            response.data.forEach(libro => {
                table.innerHTML += `
                <tr>
                    <td>${libro.id}</td>
                    <td>${libro.titulo}</td>
                    <td>${libro.codigoISBN}</td>
                    <td>${libro.anioPublicacion}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editCategoria(${editoriales.id})">EDITAR</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCategoria(${editoriales.id})">ELIMINAR</button>
                    </td>
                `;
            })
        })
    }
    function abrirModal(){
        limpiarFormulario();
        document.getElementById(`tituloModal`).innerText=`Nuevo Libro`;
    }
    function limpiarFormulario(){
        document.getElementById(`id`).value = ``;
        document.getElementById(`titulo`).value = ``;
        document.getElementById(`codigoISBN`).value = ``;
        document.getElementById(`anioPublicacion`).value = ``;
        limpiarErrores();
    }
</script>
</body>
</html>
